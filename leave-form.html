<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBSH Leave Form</title>
    <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="shared-db.js"></script>
    <script src="leave-form-renderer.js"></script>
    <style>
:root {
    --page-bg: #e5e7eb;
    --ink: #111827;
    --paper: #ffffff;
    --shadow: 0 12px 28px rgba(15, 23, 42, 0.14);
}
* { box-sizing: border-box; }
body {
    margin: 0;
    background: var(--page-bg);
    color: var(--ink);
    font-family: "Times New Roman", "Noto Serif TC", serif;
}
.page-wrap {
    max-width: 940px;
    margin: 0 auto;
    padding: 20px 0 40px;
}
.toolbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.toolbar button {
    padding: 10px 22px;
    border: none;
    border-radius: 10px;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
}
.toolbar-status {
    align-self: center;
    padding: 9px 14px;
    border-radius: 10px;
    border: 1px solid #e2e8f0;
    background: #ffffff;
    color: #64748b;
    font-size: 0.88rem;
    font-weight: 600;
}
.toolbar-status.remote {
    color: #065f46;
    background: #d1fae5;
    border-color: #a7f3d0;
}
.toolbar-status.error {
    color: #991b1b;
    background: #fee2e2;
    border-color: #fecaca;
}
.btn-back {
    background: #ffffff;
    color: #334155;
    border: 2px solid #e2e8f0 !important;
}
.btn-back:hover { background: #f8fafc; }
.btn-print {
    background: #10b981;
    color: #ffffff;
}
.btn-print:hover { background: #059669; }
.leave-sheet-stack {
    display: grid;
    gap: 18px;
}
.leave-sheet {
    position: relative;
    width: calc(100vw - 32px);
    max-width: 210mm;
    aspect-ratio: 595.32 / 841.92;
    margin: 0 auto;
    background: var(--paper);
    box-shadow: var(--shadow);
    overflow: hidden;
}
.leave-sheet-bg,
.leave-sheet-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}
.leave-sheet-bg {
    object-fit: cover;
    user-select: none;
    -webkit-user-drag: none;
}
.leave-overlay-text,
.leave-overlay-note {
    fill: var(--ink);
    font-family: "Times New Roman", "Noto Serif TC", serif;
}
.leave-empty {
    max-width: 760px;
    margin: 56px auto 0;
    padding: 56px 24px;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: var(--shadow);
    text-align: center;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.leave-empty h2 {
    margin: 0 0 8px;
    font-size: 1.35rem;
}
.leave-empty p {
    margin: 0;
    color: #64748b;
    line-height: 1.65;
}
.leave-empty-link {
    margin-top: 16px !important;
}
.leave-empty a {
    color: #10b981;
    text-decoration: none;
    font-weight: 600;
}
.page {
    position: relative;
    width: calc(100vw - 32px);
    max-width: 210mm;
    aspect-ratio: 595.32 / 841.92;
    margin: 0 auto 18px;
    background: var(--paper);
    box-shadow: var(--shadow);
    overflow: hidden;
}
.page img,
.page svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}
.page img {
    object-fit: cover;
    user-select: none;
    -webkit-user-drag: none;
}
.overlay-text {
    fill: var(--ink);
    font-family: "Times New Roman", "Noto Serif TC", serif;
}
.overlay-note {
    fill: var(--ink);
    font-family: "Times New Roman", "Noto Serif TC", serif;
}
.no-record {
    max-width: 760px;
    margin: 56px auto 0;
    padding: 56px 24px;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: var(--shadow);
    text-align: center;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.no-record h2 {
    margin: 0 0 8px;
    font-size: 1.35rem;
}
.no-record p {
    margin: 0;
    color: #64748b;
    line-height: 1.65;
}
.no-record a {
    color: #10b981;
    text-decoration: none;
    font-weight: 600;
}
@page {
    size: A4;
    margin: 0;
}
@media print {
    body {
        background: #ffffff;
    }
    .page-wrap {
        max-width: none;
        padding: 0;
    }
    .toolbar {
        display: none !important;
    }
    .leave-sheet {
        width: 210mm;
        margin: 0;
        box-shadow: none;
        break-after: page;
    }
    .leave-sheet:last-child {
        break-after: auto;
    }
}
    </style>
</head>
<body>

<div class="page-wrap">
    <div class="toolbar" id="toolbar">
        <button class="btn-back" onclick="window.close()">&#x2190; Close</button>
        <div class="toolbar-status" id="syncStatus">Storage: Local</div>
        <button class="btn-print" onclick="window.print()">&#x1F5A8; Print / Save PDF</button>
    </div>
    <div id="formContent"></div>
</div>

<script>
const DB = window.AppDB;
const Renderer = window.LeaveFormRenderer;

function updateSyncStatus() {
    const el = document.getElementById("syncStatus");
    if (!el) return;
    const status = DB.status();
    el.className = "toolbar-status";
    if (status.mode === "firebase") {
        el.classList.add("remote");
        el.textContent = "Storage: Firebase";
        return;
    }
    if (status.error) {
        el.classList.add("error");
        el.textContent = "Storage: Local Fallback";
        return;
    }
    el.textContent = "Storage: Local";
}

function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const container = document.getElementById("formContent");

    if (!id) {
        container.innerHTML = Renderer.buildEmptyMarkup("No leave ID specified.", {
            emptyHref: "index.html",
            emptyLinkLabel: "\u2190 Back to Main Site",
        });
        return;
    }

    const record = DB.leave().find(item => item.id === id);
    const rendered = Renderer.renderInto(container, record, {
        emptyHref: "index.html",
        emptyLinkLabel: "\u2190 Back to Main Site",
    });

    if (rendered) {
        document.title = Renderer.titleFor(record);
    }
}

window.addEventListener("app-db-status", updateSyncStatus);

async function bootstrap() {
    updateSyncStatus();
    await DB.init();
    init();
    updateSyncStatus();
}

bootstrap();
</script>
</body>
</html>
